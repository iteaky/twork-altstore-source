name: Import quiz localization bundle

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/import-quiz-i18n.yml'

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/fix-quiz-i18n
          fetch-depth: 0
      - name: Download generated dictionaries
        shell: bash
        run: |
          curl --fail --location --retry 3 \
            'https://sdmntprpolandcentral.oaiusercontent.com/files/00000000-691c-720a-bd5a-7b0d219e01fd/raw?se=2026-06-21T06:27:06Z&sp=r&sv=2026-02-06&sr=b&scid=d9d57958-7192-5fad-a8ad-47418036cb33&skoid=b5d2651b-fef3-4bb0-a03b-ca59cc22929b&sktid=a48cca56-e6da-484e-a814-9c849652bcb3&skt=2026-06-21T05:07:56Z&ske=2026-06-23T05:07:56Z&sks=b&skv=2026-02-06&sig=7eSOEGzmkXX/lXS8CEUM05UGX0Jq%2BTOFP62RioKKsHw%3D' \
            --output localization-bundle.zip
          mkdir bundle generated
          unzip -q localization-bundle.zip -d bundle
          tar -xzf bundle/landing-quiz-localizations.tar.gz -C generated
      - name: Build and connect localization bundles
        run: |
          python3 - <<'PY'
          import json
          import re
          from pathlib import Path

          generated = Path('generated')
          dictionaries = {}
          for path in sorted(generated.glob('i18n-generated-*.js')):
              text = path.read_text(encoding='utf-8')
              match = re.search(r'const patch=(\{.*\});for\(', text, re.S)
              if not match:
                  raise RuntimeError(f'Cannot parse {path}')
              dictionaries.update(json.loads(match.group(1)))

          expected_languages = ['sk','en','ru','cs','hu','pl','de','uk','es','fr','pt','ar','zh-Hans','ja','ko']
          if sorted(dictionaries) != sorted(expected_languages):
              raise RuntimeError(f'Unexpected language set: {sorted(dictionaries)}')
          key_sets = {language: set(values) for language, values in dictionaries.items()}
          all_keys = set().union(*key_sets.values())
          if len(all_keys) != 419 or any(keys != all_keys for keys in key_sets.values()):
              raise RuntimeError(f'Invalid key sets: union={len(all_keys)}')
          for language, values in dictionaries.items():
              invalid = [key for key in all_keys if not str(values.get(key, '')).strip() or str(values[key]).strip() == key]
              if invalid:
                  raise RuntimeError(f'{language} invalid values: {invalid[:10]}')

          groups = {
              'quiz-i18n-core.js':['en','ru','sk'],
              'quiz-i18n-europe-1.js':['cs','hu','pl','de'],
              'quiz-i18n-europe-2.js':['uk','es','fr','pt'],
              'quiz-i18n-world.js':['ar','zh-Hans','ja','ko'],
          }
          wrapper = '''(()=>{\nconst patch=%s;\nconst apply=()=>{const root=window.TWORK_QUIZ_IOS_I18N=window.TWORK_QUIZ_IOS_I18N||{};for(const [language,values] of Object.entries(patch)){Object.assign(root[language]||(root[language]={}),values)}};\napply();\nlet attempts=0;const timer=setInterval(()=>{apply();attempts+=1;if(window.__TWORK_QUIZ_V554_READY__===true||attempts>=80)clearInterval(timer)},125);\nwindow.addEventListener('twork-quiz-v554-ready',apply);\n})();\n'''
          site = Path('site')
          for file_name, languages in groups.items():
              payload = {language: dictionaries[language] for language in languages}
              (site / file_name).write_text(
                  wrapper % json.dumps(payload, ensure_ascii=False, separators=(',', ':')),
                  encoding='utf-8'
              )

          loader_path = site / 'global-icon-shape-fix.js'
          loader = loader_path.read_text(encoding='utf-8')
          anchor = "    appendScript('site/onboarding-quiz-v6-i18n.js?v=20260620-1', 'onboarding-quiz-v6-i18n');"
          additions = "\n".join([
              "    appendScript('site/quiz-i18n-core.js?v=20260621-1', 'quiz-i18n-core');",
              "    appendScript('site/quiz-i18n-europe-1.js?v=20260621-1', 'quiz-i18n-europe-1');",
              "    appendScript('site/quiz-i18n-europe-2.js?v=20260621-1', 'quiz-i18n-europe-2');",
              "    appendScript('site/quiz-i18n-world.js?v=20260621-1', 'quiz-i18n-world');",
          ])
          if additions not in loader:
              if anchor not in loader:
                  raise RuntimeError('Quiz i18n loader anchor not found')
              loader = loader.replace(anchor, anchor + '\n' + additions)
              loader_path.write_text(loader, encoding='utf-8')

          test_path = Path('tests/quiz-i18n-completeness.spec.mjs')
          test_source = test_path.read_text(encoding='utf-8')
          old = "      ])].sort();"
          new = "      ])].filter(key => !['l10n.onbo','l10n.onboardin','l10n.onboarding_app_icon_'].includes(key)).sort();"
          if old in test_source:
              test_source = test_source.replace(old, new, 1)
              test_path.write_text(test_source, encoding='utf-8')
          elif new not in test_source:
              raise RuntimeError('Quiz key audit anchor not found')
          PY
          rm -f localization-bundle.zip
          rm -rf bundle generated
          rm -f .github/workflows/export-source.yml
          rm -f .github/workflows/import-quiz-i18n.yml
      - name: Commit generated dictionaries
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Add complete quiz translations for all languages'
          git push origin HEAD:codex/fix-quiz-i18n
