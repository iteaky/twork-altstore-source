name: Apply brand polish

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch landing markup and cache versions
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path('index.html')
          s = p.read_text()
          s = s.replace('<span class="brand-wordmark" aria-hidden="true"></span><span class="sr-only">TWORK</span>', '<span class="brand-wordmark" aria-hidden="true"></span>')
          s = s.replace('<div class="global-center">TWORK</div>', '<div class="global-center"><img src="icon.png" alt=""></div>')
          if 'site/brand-fixes.css' not in s:
              s = s.replace('<link rel="stylesheet" href="site/sections.css?v=20260614-1">', '<link rel="stylesheet" href="site/sections.css?v=20260614-1">\n  <link rel="stylesheet" href="site/brand-fixes.css?v=20260614-1">')
          s = s.replace('site/premium.js?v=20260614-4', 'site/premium.js?v=20260614-5')
          p.write_text(s)
          PY
      - name: Commit changes
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Apply header and app icon polish"
          git push
