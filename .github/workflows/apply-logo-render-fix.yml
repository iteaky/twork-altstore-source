name: Apply clean wordmark rendering

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Connect clean wordmark stylesheet
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          p = Path('index.html')
          s = p.read_text()
          link = '  <link rel="stylesheet" href="site/logo-render-fix.css?v=20260614-1">'

          if 'site/logo-render-fix.css' not in s:
              marker = '  <link rel="stylesheet" href="site/theme-icon-switch.css?v=20260614-1">'
              if marker in s:
                  s = s.replace(marker, marker + '\n' + link)
              else:
                  s = s.replace('</head>', link + '\n</head>')
          else:
              s = re.sub(
                  r'site/logo-render-fix\.css\?v=[^"]+',
                  'site/logo-render-fix.css?v=20260614-1',
                  s,
              )

          p.write_text(s)
          PY
      - name: Commit changes
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Use alpha-safe TWORK wordmark rendering"
          git push
