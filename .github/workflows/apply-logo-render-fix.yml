name: Apply landing updates

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply iOS and offline privacy content
        run: python3 scripts/apply-ios-privacy.py
      - name: Connect cinematic theme transition
        run: python3 scripts/apply-theme-cinematic.py
      - name: Keep web demo hidden from landing
        run: python3 scripts/apply-web-app-entry.py
      - name: Replace fake hero dashboard with real TWORK home
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          p = Path('index.html')
          s = p.read_text()

          css = 'site/hero-real-home.css?v=20260614-2'
          css_link = f'  <link rel="stylesheet" href="{css}">'
          if 'site/hero-real-home.css' not in s:
              s = s.replace('</head>', css_link + '\n</head>')
          else:
              s = re.sub(r'site/hero-real-home\.css\?v=[^"]+', css, s)

          real_home = '''<article class="device device-main"><div class="device-frame"><div class="dynamic-island"></div><div class="app-screen real-home-preview">
            <div class="real-app-topline"><span>9:41</span><span>● ● ●</span></div>
            <div class="real-home-header">
              <span class="real-home-logo" role="img" aria-label="TWORK"></span>
              <span class="real-home-gear" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M12 8.2a3.8 3.8 0 1 0 0 7.6 3.8 3.8 0 0 0 0-7.6Z"/><path d="M19.4 13.2v-2.4l-2-.6a7.4 7.4 0 0 0-.6-1.4l1-1.8-1.7-1.7-1.8 1a7.4 7.4 0 0 0-1.4-.6l-.6-2H9.9l-.6 2a7.4 7.4 0 0 0-1.4.6l-1.8-1-1.7 1.7 1 1.8a7.4 7.4 0 0 0-.6 1.4l-2 .6v2.4l2 .6c.1.5.3 1 .6 1.4l-1 1.8 1.7 1.7 1.8-1c.4.3.9.5 1.4.6l.6 2h2.4l.6-2c.5-.1 1-.3 1.4-.6l1.8 1 1.7-1.7-1-1.8c.3-.4.5-.9.6-1.4l2-.6Z"/></svg></span>
            </div>
            <div class="real-home-date">Воскресенье, 14 июня</div>
            <div class="real-home-stack">
              <article class="real-schedule-card">
                <div class="real-schedule-title"><b>Тренировки</b><span class="real-chevron"></span></div>
                <div class="real-day-card"><div class="real-day-head"><b>Сегодня</b><span>3 тренировки</span></div><div class="real-training-row"><time>10:00</time><strong>Максим и Олег</strong></div><div class="real-training-row"><time>15:00</time><strong>Iron Club · дежурство</strong></div><div class="real-training-row"><time>18:00</time><strong>Анна Ковалёва</strong></div></div>
                <div class="real-day-card"><div class="real-day-head"><b>Завтра</b><span>1 тренировка</span></div><div class="real-training-row"><time>10:00</time><strong>Mark · онлайн</strong></div></div>
              </article>
              <article class="real-home-action"><span class="real-action-icon" style="background:linear-gradient(145deg,#c79feb,#a880d6)"><svg viewBox="0 0 24 24"><path d="M5 17h14l-1.5-2.2V10a5.5 5.5 0 0 0-11 0v4.8L5 17Z"/><path d="M9.5 19.5a2.8 2.8 0 0 0 5 0"/></svg></span><span class="real-action-copy"><b>Уведомления</b><span>5 сообщений к отправке</span></span><span class="real-action-badge">5</span></article>
              <article class="real-home-action"><span class="real-action-icon" style="background:linear-gradient(145deg,#8cc7d9,#73a6c7)"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="16" rx="3"/><path d="M7 8h.1M10 8h7M7 12h.1M10 12h7M7 16h.1M10 16h5"/></svg></span><span class="real-action-copy"><b>Онлайн</b><span>Управление доступом к ресурсам</span></span><span class="real-chevron"></span></article>
              <article class="real-home-action"><span class="real-action-icon" style="background:linear-gradient(145deg,#d9b89e,#bf9980)"><svg viewBox="0 0 24 24"><path d="M9.5 11a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7ZM3 20c.4-4.3 2.6-6.5 6.5-6.5S15.6 15.7 16 20"/><path d="M16 11a3 3 0 1 0 0-6M16.2 14c2.8.1 4.4 2.1 4.8 5"/></svg></span><span class="real-action-copy"><b>Клиенты</b><span>2 клиента с долгом</span></span><span class="real-action-badge">2</span></article>
              <article class="real-home-action"><span class="real-action-icon" style="background:linear-gradient(145deg,#e493a4,#cf6f84)"><svg viewBox="0 0 24 24"><path d="M4 21V8l8-4 8 4v13M2 21h20M8 11h2M14 11h2M8 15h2M14 15h2M10 21v-3h4v3"/></svg></span><span class="real-action-copy"><b>Клубы</b><span>Клиенты и взаиморасчёты</span></span><span class="real-chevron"></span></article>
            </div>
            <div class="real-preview-fade"></div>
          </div></div></article>'''

          s = re.sub(
              r'<article class="device device-main">.*?</article>',
              real_home,
              s,
              count=1,
              flags=re.S,
          )
          s = re.sub(
              r'\s*<script src="site/hero-real-home\.js\?v=[^"]+" defer></script>',
              '',
              s,
          )

          p.write_text(s)
          PY
      - name: Refresh mobile header stylesheet
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          p = Path('index.html')
          s = p.read_text()
          s = re.sub(
              r'site/mobile-final\.css\?v=[^"]+',
              'site/mobile-final.css?v=20260614-3',
              s,
          )
          p.write_text(s)
          PY
      - name: Connect clean wordmark stylesheet
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          p = Path('index.html')
          s = p.read_text()
          link = '  <link rel="stylesheet" href="site/logo-render-fix.css?v=20260614-3">'

          if 'site/logo-render-fix.css' not in s:
              marker = '  <link rel="stylesheet" href="site/theme-icon-switch.css?v=20260614-1">'
              if marker in s:
                  s = s.replace(marker, marker + '\n' + link)
              else:
                  s = s.replace('</head>', link + '\n</head>')
          else:
              s = re.sub(
                  r'site/logo-render-fix\.css\?v=[^"]+',
                  'site/logo-render-fix.css?v=20260614-3',
                  s,
              )

          p.write_text(s)
          PY
      - name: Commit changes
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Apply landing updates"
          git push
