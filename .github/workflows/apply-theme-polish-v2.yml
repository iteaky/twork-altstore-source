name: Apply theme polish v2

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply app-like reminders showcase and theme icon switch
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          p = Path('index.html')
          s = p.read_text()

          link = '  <link rel="stylesheet" href="site/theme-polish-v2.css?v=20260614-3">'
          if 'site/theme-polish-v2.css' not in s:
              marker = '  <link rel="stylesheet" href="site/brand-fixes.css?v=20260614-1">'
              s = s.replace(marker, marker + '\n' + link)
          else:
              s = re.sub(
                  r'site/theme-polish-v2\.css\?v=[^"]+',
                  'site/theme-polish-v2.css?v=20260614-3',
                  s,
              )

          icon_link = '  <link rel="stylesheet" href="site/theme-icon-switch.css?v=20260614-1">'
          if 'site/theme-icon-switch.css' not in s:
              s = s.replace(link, link + '\n' + icon_link)
          else:
              s = re.sub(
                  r'site/theme-icon-switch\.css\?v=[^"]+',
                  'site/theme-icon-switch.css?v=20260614-1',
                  s,
              )

          visual = '''<div class="phone-message reminder-app-phone reveal" aria-hidden="true"><div class="reminder-statusbar"><span>9:41</span><span>● ● ●</span></div><div class="reminder-nav"><span>×</span><strong>Уведомления</strong><span>＋</span></div><div class="reminder-scroll"><div class="reminder-summary-card"><div class="reminder-bell"><svg viewBox="0 0 24 24"><path d="M12 22a2.5 2.5 0 0 0 2.35-1.65h-4.7A2.5 2.5 0 0 0 12 22Zm7-5.2-1.5-1.7V10a5.6 5.6 0 0 0-4.5-5.5V3.4a1 1 0 1 0-2 0v1.1A5.6 5.6 0 0 0 6.5 10v5.1L5 16.8a1 1 0 0 0 .75 1.65h12.5A1 1 0 0 0 19 16.8Z"/></svg></div><div class="reminder-summary-copy"><strong>Уведомления</strong><small>Пора отправить</small></div><span class="reminder-summary-count">Всего: 2</span></div><div class="reminder-segmented"><span>Запланированные</span><span class="active">Пора отправить</span><span>Отправленные</span></div><div class="reminder-draft-card"><div class="reminder-draft-head"><div class="reminder-draft-identity"><strong>Анна Ковалёва</strong><small>Напоминание о расписании</small><span class="reminder-ready-badge">Пора отправить</span></div><span class="reminder-action"><svg viewBox="0 0 24 24"><path d="M21.6 3.2 2.9 10.4c-1.28.5-1.27 1.2-.23 1.52l4.8 1.5 1.83 5.65c.22.62.11.87.75.87.49 0 .7-.22.97-.48l2.3-2.24 4.78 3.53c.88.49 1.51.24 1.73-.82L22.96 5c.32-1.3-.5-1.89-1.36-1.8ZM9.35 13.08l9.38-5.92c.47-.28.9-.13.55.18l-7.74 6.98-.3 3.15-1.89-4.39Z"/></svg>Отправить</span></div><p class="reminder-draft-text">Напоминаю расписание тренировок на эту неделю:<br><br>Анна — 15 июня, 18:00<br>Анна — 18 июня, 18:00<br><br>Если нужно скорректировать время — дайте знать заранее.</p><small class="reminder-draft-date">14 июня, 11:00</small></div><div class="reminder-draft-card secondary"><div class="reminder-draft-head"><div class="reminder-draft-identity"><strong>Mark Spencer</strong><small>Напоминание о расписании</small><span class="reminder-ready-badge">Пора отправить</span></div><span class="reminder-action copy"><svg viewBox="0 0 24 24"><path d="M8 7V5a3 3 0 0 1 3-3h8a3 3 0 0 1 3 3v8a3 3 0 0 1-3 3h-2v3a3 3 0 0 1-3 3H6a3 3 0 0 1-3-3v-8a3 3 0 0 1 3-3h2Zm3-3a1 1 0 0 0-1 1v2h4a3 3 0 0 1 3 3v4h2a1 1 0 0 0 1-1V5a1 1 0 0 0-1-1h-8ZM6 9a1 1 0 0 0-1 1v9a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1v-9a1 1 0 0 0-1-1H6Z"/></svg>Скопировать</span></div><p class="reminder-draft-text">Reminder: your online training is tomorrow at 17:00 London time.</p><small class="reminder-draft-date">14 June, 11:00</small></div></div></div>'''

          marker = '<div class="message-copy reveal">'
          pattern = r'<div class="phone-message[^\"]* reveal" aria-hidden="true">.*?</div><div class="message-copy reveal">'
          s, replacements = re.subn(pattern, visual + marker, s, count=1, flags=re.S)
          if replacements != 1:
              raise SystemExit('Message showcase block was not found')

          p.write_text(s)
          PY
      - name: Commit changes
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Switch app icon with the site theme"
          git push
