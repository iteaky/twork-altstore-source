name: Apply theme polish v2

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Connect theme polish stylesheet
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path('index.html')
          s = p.read_text()
          link = '  <link rel="stylesheet" href="site/theme-polish-v2.css?v=20260614-1">'
          if 'site/theme-polish-v2.css' not in s:
              marker = '  <link rel="stylesheet" href="site/brand-fixes.css?v=20260614-1">'
              s = s.replace(marker, marker + '\n' + link)
          p.write_text(s)
          PY
      - name: Commit changes
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Apply light final CTA and clean dark wordmark"
          git push
