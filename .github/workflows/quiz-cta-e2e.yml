name: Quiz CTA E2E

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quiz-cta:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install test runner
        run: npm install --no-save @playwright/test@1.52.0
      - name: Install browser
        run: npx playwright install --with-deps chromium
      - name: Run quiz CTA tests
        shell: bash
        run: |
          set +e
          npx playwright test --config=playwright.config.cjs tests/quiz-cta.spec.js --project=chromium > quiz-test.log 2>&1
          status=$?
          cat quiz-test.log
          exit $status
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quiz-cta-diagnostics
          path: |
            quiz-test.log
            test-results
            playwright-report
          if-no-files-found: warn
