name: Quiz CTA E2E

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quiz-cta:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install test runner
        run: npm install --no-save @playwright/test@1.52.0
      - name: Install browser
        run: npx playwright install --with-deps chromium
      - name: Run quiz CTA tests
        run: npx playwright test --config=playwright.config.cjs tests/quiz-cta.spec.js --project=chromium
