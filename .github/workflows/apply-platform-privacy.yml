name: Apply iOS offline privacy landing updates

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update privacy cards
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          p = Path('index.html')
          s = p.read_text()

          if 'site/platform-privacy.css' not in s:
              s = s.replace('</head>', '  <link rel="stylesheet" href="site/platform-privacy.css?v=20260614-3">\n</head>')
          else:
              s = re.sub(
                  r'site/platform-privacy\.css\?v=[^"]+',
                  'site/platform-privacy.css?v=20260614-3',
                  s,
              )

          privacy = '''    <section class="privacy-section section-pad" id="privacy">
      <div class="container privacy-layout">
        <div class="privacy-copy reveal">
          <p class="overline">Приватность по умолчанию</p>
          <h2>Ваши клиенты.<br>На вашем iPhone.</h2>
          <p>TWORK работает без подключения к интернету. Данные клиентов, тренировок, абонементов и оплат хранятся локально на устройстве и не загружаются в серверную базу TWORK.</p>
          <p class="privacy-apple-note"><strong>Сервисы Apple — только по вашему выбору.</strong> При включённых резервных копиях iCloud или синхронизации Apple Calendar данные обрабатываются сервисами Apple в соответствии с настройками вашего устройства.</p>
        </div>
        <div class="privacy-cards reveal">
          <article class="privacy-card">
            <div class="privacy-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M3 10.8a14 14 0 0 1 18 0"/><path d="M6.5 14.3a9 9 0 0 1 11 0"/><path d="M10 17.8a3.5 3.5 0 0 1 4 0"/><path d="M4 4l16 16"/></svg></div>
            <div class="privacy-card-copy"><small>Офлайн</small><h3>Основная работа без интернета</h3><p>Расписание, клиенты, абонементы, оплаты и расчёты доступны на телефоне даже без подключения к сети.</p></div>
          </article>
          <article class="privacy-card">
            <div class="privacy-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M12 3 5 6v5c0 4.7 2.8 8.3 7 10 4.2-1.7 7-5.3 7-10V6l-7-3Z"/><path d="m9 12 2 2 4-4"/></svg></div>
            <div class="privacy-card-copy"><small>Локальные данные</small><h3>Клиентская база остаётся на устройстве</h3><p>У TWORK нет собственного сервера, на который загружаются данные ваших клиентов.</p></div>
          </article>
          <article class="privacy-card">
            <div class="privacy-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><rect x="7" y="2" width="10" height="20" rx="2.6"/><path d="M10 5h4"/><path d="M11 19h2"/></svg></div>
            <div class="privacy-card-copy"><small>Платформа</small><h3>Создано только для iPhone</h3><p>Первая версия TWORK будет доступна только на iOS и интегрирована с возможностями Apple.</p></div>
          </article>
        </div>
      </div>
    </section>'''

          pattern = r'    <section class="privacy-section section-pad" id="privacy">.*?</section>'
          if re.search(pattern, s, flags=re.S):
              s = re.sub(pattern, privacy, s, count=1, flags=re.S)
          else:
              s = s.replace('    <section class="final-section section-pad">', privacy + '\n\n    <section class="final-section section-pad">')

          p.write_text(s)
          PY
      - name: Commit changes
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Center privacy icons in their containers"
          git push
