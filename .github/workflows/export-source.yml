name: Export source snapshot

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/export-source.yml'

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Package source
        run: tar --exclude=.git --exclude=source-snapshot.tar.gz -czf source-snapshot.tar.gz .
      - name: Upload source
        uses: actions/upload-artifact@v4
        with:
          name: source-snapshot
          path: source-snapshot.tar.gz
          if-no-files-found: error
